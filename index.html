<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Text Processor (Fixed)</title>
    <style>
        :root { --primary: #2c3e50; --accent: #34495e; --border: #d1d8e0; --bg: #fdfdfd; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); margin: 0; padding: 40px 20px; color: var(--primary); }
        .wrapper { max-width: 1000px; margin: auto; }
        
        .editor-section { margin-bottom: 30px; }
        textarea { width: 100%; height: 250px; padding: 20px; border: 2px solid var(--border); border-radius: 4px; font-size: 16px; line-height: 1.6; resize: vertical; outline: none; transition: border-color 0.2s; }
        textarea:focus { border-color: var(--primary); }
        
        .toolbar { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        button { background: white; border: 1px solid var(--primary); color: var(--primary); padding: 8px 16px; cursor: pointer; font-size: 14px; font-weight: 500; border-radius: 3px; }
        button:hover { background: var(--primary); color: white; }
        button.undo-btn { border-color: #7f8c8d; color: #7f8c8d; }
        button.undo-btn:hover { background: #7f8c8d; color: white; }

        .dashboard { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        .panel { border: 1px solid var(--border); padding: 20px; border-radius: 4px; background: white; }
        .panel h3 { margin: 0 0 15px 0; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #95a5a6; border-bottom: 1px solid #f1f1f1; padding-bottom: 10px; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-item { font-size: 20px; font-weight: bold; }
        .stat-label { font-size: 12px; color: #7f8c8d; display: block; }
        
        .tool-row { margin-bottom: 20px; }
        input { width: calc(50% - 10px); padding: 8px; border: 1px solid var(--border); border-radius: 3px; margin-bottom: 10px; }
        .full-width { width: 100%; box-sizing: border-box; }
        
        .suggestion-box { font-size: 13px; color: #2980b9; margin-top: 5px; min-height: 18px; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="toolbar">
        <button onclick="processAll()">Process Text</button>
        <button class="undo-btn" onclick="triggerUndo()">Undo Last Edit</button>
        <button onclick="clearAll()">Clear All</button>
    </div>

    <div class="editor-section">
        <textarea id="mainInput" placeholder="Start typing or paste your content here..." oninput="saveHistory()"></textarea>
    </div>

    <div class="dashboard">
        <div class="left-col">
            <div class="panel">
                <h3>Text Summary</h3>
                <div class="stats-grid" id="statsDisplay">
                    <div><span class="stat-label">Total Words</span> <span id="wordCount" class="stat-item">0</span></div>
                    <div><span class="stat-label">Character Count</span> <span id="charCount" class="stat-item">0</span></div>
                    <div><span class="stat-label">Unique Vocabulary</span> <span id="uniqueCount" class="stat-item">0</span></div>
                </div>
            </div>
            
            <div class="panel" style="margin-top: 20px;">
                <h3>Core Keywords</h3>
                <div id="keywordsList" style="line-height: 2;">---</div>
            </div>
        </div>

        <div class="right-col">
            <div class="panel">
                <h3>Find & Replace</h3>
                <input type="text" id="findWord" placeholder="Find word..." class="full-width">
                <input type="text" id="replaceWord" placeholder="Replace with..." class="full-width">
                <button style="width:100%" onclick="executeSwap()">Update Text</button>
            </div>
        </div>
    </div>
</div>

<script>
    // نظام "تاريخ التعديلات" للأندرو (Undo History)
    let history = [""];
    
    function saveHistory() {
        const currentText = document.getElementById('mainInput').value;
        if (currentText !== history[history.length - 1]) {
            history.push(currentText);
            if (history.length > 20) history.shift(); // حفظ آخر 20 تعديل فقط
        }
    }

    function processAll() {
        const text = document.getElementById('mainInput').value;
        
        // حساب الإحصائيات
        const words = text.trim() ? text.trim().split(/\s+/) : [];
        const chars = text.length;
        const unique = new Set(words.map(w => w.toLowerCase())).size;
        
        // تحديث الواجهة
        document.getElementById('wordCount').innerText = words.length;
        document.getElementById('charCount').innerText = chars;
        document.getElementById('uniqueCount').innerText = unique;
                const counts = {};
        words.forEach(w => { if(w.length > 3) counts[w] = (counts[w] || 0) + 1; });
        const keywords = Object.keys(counts)
            .sort((a, b) => counts[b] - counts[a])
            .slice(0, 5);
            
        document.getElementById('keywordsList').innerText = keywords.length ? keywords.join(' • ') : "---";
    }

    function executeSwap() {
        saveHistory();
        const text = document.getElementById('mainInput').value;
        const oldW = document.getElementById('findWord').value;
        const newW = document.getElementById('replaceWord').value;
        
        if(!oldW) return;
        
        const newText = text.split(oldW).join(newW);
        document.getElementById('mainInput').value = newText;
        processAll();
    }

    function triggerUndo() {
        if (history.length > 1) {
            history.pop();
            const previousText = history[history.length - 1];
            document.getElementById('mainInput').value = previousText;
            processAll();
        }
    }

    function clearAll() {
        saveHistory();
        document.getElementById('mainInput').value = '';
        processAll();
    }
</script>

</body>
</html>
